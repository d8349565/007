{% extends "_base.html" %}
{% set active = 'graph' %}
{% block title %}知识图谱 — 资讯颗粒化{% endblock %}
{% block container_class %}container-fluid{% endblock %}

{% block head %}
<style>
/* Entity View Tabs */
.entity-view-tabs { display:flex;gap:0;padding:0 16px;background:#ffffff;border-bottom:1px solid #e2e8f0;height:44px;align-items:center; }
.ev-tab { outline: none; }
.ev-tab.active { color: #0f172a; border-bottom-color: #3b82f6; }
.ev-tab:hover:not(.active) { color: #475569; }

/* 两个视图画布的显示切换 */
.view-panel { display: none; }
.view-panel.active { display: flex; }

/* Graph page full-screen layout */
.graph-page { display: flex; height: calc(100vh - 52px); overflow: hidden; position: relative; }
.graph-canvas-wrap {
  flex: 1; position: relative;
  background-color: #f0f4f8;
  background-image: radial-gradient(#cbd5e1 1.2px, transparent 1.2px);
  background-size: 24px 24px;
  overflow: hidden;
}
.graph-canvas-wrap svg { width: 100%; height: 100%; display: block; user-select: none; -webkit-user-select: none; }
.graph-canvas-wrap svg text { user-select: none; -webkit-user-select: none; pointer-events: none; }

/* Filter panel (top-left) */
.graph-filter {
  position: absolute; top: 16px; left: 16px; z-index: 10;
  background: rgba(255,255,255,0.97); border: 1px solid #e2e8f0;
  border-radius: 10px; padding: 14px 18px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  min-width: 220px; font-size: 13px;
}
.graph-filter label { display: block; font-size: 11px; font-weight: 600; color: #64748b; margin-bottom: 4px; margin-top: 10px; text-transform: uppercase; letter-spacing: 0.4px; }
.graph-filter label:first-child { margin-top: 0; }
.graph-filter select { width: 100%; padding: 6px 8px; border: 1px solid #cbd5e1; border-radius: 5px; font-size: 13px; background: #ffffff; color: #0f172a; }
.graph-filter input[type="text"] { width: 100%; padding: 6px 8px; border: 1px solid #cbd5e1; border-radius: 5px; font-size: 13px; background: #ffffff; color: #0f172a; box-sizing: border-box; }
.graph-filter input[type="range"] { width: 100%; accent-color: #3b82f6; }
.graph-filter .filter-stats { margin-top: 12px; padding-top: 10px; border-top: 1px solid #e2e8f0; font-size: 11px; color: #64748b; line-height: 1.7; }
.graph-filter .filter-stats strong { color: #0f172a; }
.graph-filter .search-match-hint { font-size: 11px; color: #d97706; margin-top: 4px; }

/* Legend (bottom-left) */
.graph-legend-panel {
  position: absolute; bottom: 24px; left: 16px; z-index: 10;
  background: rgba(255,255,255,0.97); border: 1px solid #e2e8f0;
  border-radius: 10px; padding: 12px 16px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
}
.graph-legend-title { font-size: 11px; font-weight: 600; color: #db2777; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.graph-legend-items { display: flex; flex-wrap: wrap; gap: 10px 16px; max-width: 320px; }
.graph-legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #475569; }
.graph-legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

/* Edge labels toggle (top-right) */
.edge-toggle {
  position: absolute; top: 16px; right: 16px; z-index: 10;
  display: flex; align-items: center; gap: 10px;
  background: #ffffff; padding: 8px 14px; border-radius: 20px;
  border: 1px solid #e2e8f0; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.edge-toggle label { font-size: 12px; color: #475569; cursor: pointer; user-select: none; }
.toggle-sw { position: relative; display: inline-block; width: 36px; height: 20px; }
.toggle-sw input { opacity: 0; width: 0; height: 0; }
.toggle-sw .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #cbd5e1; border-radius: 20px; transition: 0.3s; }
.toggle-sw .slider::before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background: #94a3b8; border-radius: 50%; transition: 0.3s; }
.toggle-sw input:checked + .slider { background: #3b82f6; }
.toggle-sw input:checked + .slider::before { transform: translateX(16px); }

/* Detail panel (right side) */
.graph-detail {
  position: absolute; top: 50px; right: 16px; z-index: 20;
  width: 340px; max-height: calc(100% - 80px);
  background: #ffffff; border: 1px solid #e2e8f0; border-radius: 10px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  display: none; flex-direction: column; font-size: 13px;
  overflow: hidden;
}
.graph-detail.show { display: flex; }
.graph-detail-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 16px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; flex-shrink: 0;
}
.graph-detail-title { font-weight: 600; color: #0f172a; font-size: 14px; }
.graph-detail-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #94a3b8; line-height: 1; padding: 0; }
.graph-detail-close:hover { color: #0f172a; }
.graph-detail-body { padding: 16px; overflow-y: auto; flex: 1; }
.gd-row { margin-bottom: 10px; display: flex; flex-wrap: wrap; gap: 4px; }
.gd-label { color: #64748b; font-size: 12px; font-weight: 500; min-width: 70px; }
.gd-value { color: #374151; flex: 1; word-break: break-word; }
.gd-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.gd-section { margin-top: 14px; padding-top: 12px; border-top: 1px solid #e2e8f0; }
.gd-section-title { font-size: 12px; font-weight: 600; color: #64748b; margin-bottom: 8px; }
.gd-evidence { background: #f8fafc; border-left: 3px solid #cbd5e1; padding: 8px 10px; border-radius: 4px; font-size: 12px; color: #374151; line-height: 1.6; max-height: 120px; overflow-y: auto; }
.gd-value-highlight { font-size: 18px; font-weight: 800; color: #3b82f6; }
.gd-unit { font-size: 11px; color: #94a3b8; margin-left: 2px; }
.gd-link { display: inline-block; margin-top: 8px; color: #3b82f6; font-size: 12px; font-weight: 500; cursor: pointer; }
.gd-link:hover { text-decoration: underline; }

/* Empty state */
.graph-empty {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  text-align: center; color: #94a3b8;
}
.graph-empty .empty-icon { font-size: 56px; opacity: 0.2; margin-bottom: 16px; }
.graph-empty p { font-size: 15px; margin-bottom: 6px; }
.graph-empty a { color: #3b82f6; font-size: 13px; }
</style>
{% endblock %}

{% block content %}
<!-- Entity View Tabs -->
<div class="entity-view-tabs">
  <button class="ev-tab" data-view="hierarchy" onclick="switchEntityView('hierarchy')" style="background:none;border:none;color:#475569;font-size:13px;font-weight:500;padding:8px 16px;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;">层级视图</button>
  <button class="ev-tab active" data-view="graph" onclick="switchEntityView('graph')" style="background:none;border:none;color:#0f172a;font-size:13px;font-weight:500;padding:8px 16px;cursor:pointer;border-bottom:2px solid #3b82f6;transition:all 0.15s;">关系图谱</button>
</div>

<!-- Hierarchy view panel -->
<div class="view-panel" id="hierarchyViewPanel" style="flex-direction: column; height: calc(100vh - 52px - 44px);">
  <iframe src="/hierarchy" style="flex:1; border:none; width:100%; height:100%;" id="hierarchyFrame"></iframe>
</div>

<!-- Graph view panel -->
<div class="view-panel active" id="graphViewPanel" style="height: calc(100vh - 52px - 44px);">
  <div class="graph-canvas-wrap">
    <svg id="graphSvg"></svg>

    <!-- Filter panel -->
    <div class="graph-filter">
      <label>搜索实体</label>
      <input type="text" id="filterSearch" placeholder="输入实体名称…" onkeydown="if(event.key==='Enter') searchGraphNode()" />
      <div id="searchMatchHint" class="search-match-hint"></div>

      <label>事实类型</label>
      <select id="filterType">
        <option value="">全部类型</option>
        {% for ft in fact_types %}
        <option value="{{ ft }}">{{ FACT_TYPE_NAMES.get(ft, ft) }}</option>
        {% endfor %}
      </select>

      <label>实体类型</label>
      <select id="filterEntityType" onchange="applyClientFilter()">
        <option value="">全部</option>
        <option value="COMPANY">企业</option>
        <option value="GROUP">群体/排名</option>
        <option value="PROJECT">项目</option>
        <option value="COUNTRY">国家/地区</option>
        <option value="REGION">地区/城市</option>
        <option value="PRODUCT">产品/品牌</option>
        <option value="PERSON">人物</option>
        <option value="ORG">机构/组织</option>
        <option value="OTHER">其他</option>
        <option value="UNKNOWN">未知</option>
        <option value="__TEXT__">未标准化</option>
      </select>

      <label>最少事实数 <span id="minFactLabel" style="color:#0f172a;">0</span></label>
      <input type="range" id="filterMinFacts" min="0" max="20" value="0" oninput="document.getElementById('minFactLabel').textContent=this.value; applyClientFilter()" />

      <div class="filter-stats" id="graphStats"></div>
    </div>

    <!-- Edge label toggle -->
    <div class="edge-toggle">
      <label class="toggle-sw">
        <input type="checkbox" id="edgeLabelToggle" checked>
        <span class="slider"></span>
      </label>
      <label for="edgeLabelToggle">显示关系标签</label>
    </div>

    <!-- Legend -->
    <div class="graph-legend-panel" id="graphLegend" style="display:none;"></div>

    <!-- Detail panel -->
    <div class="graph-detail" id="detailPanel">
      <div class="graph-detail-header">
        <span class="graph-detail-title" id="detailTitle"></span>
        <button class="graph-detail-close" onclick="closeDetail()">&times;</button>
      </div>
      <div class="graph-detail-body" id="detailBody"></div>
    </div>

    <!-- Empty state -->
    <div class="graph-empty" id="graphEmpty" style="display:none;">
      <div class="empty-icon">◇</div>
      <p>暂无可展示的图谱数据</p>
      <p style="font-size:12px;color:#94a3b8;">需要已通过审核且已链接实体的事实</p>
      <a href="/passed">查看已通过结果 →</a>
    </div>
  </div>
</div>

<script>
function switchEntityView(view) {
  document.querySelectorAll('.ev-tab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.view === view);
    btn.style.color = btn.dataset.view === view ? '#0f172a' : '#475569';
    btn.style.borderBottomColor = btn.dataset.view === view ? '#3b82f6' : 'transparent';
  });
  document.getElementById('graphViewPanel').classList.toggle('active', view === 'graph');
  document.getElementById('hierarchyViewPanel').classList.toggle('active', view === 'hierarchy');
  // 切换到图谱视图时重新渲染（初始渲染时面板可能是隐藏状态导致尺寸为0）
  if (view === 'graph') {
    if (graphData) renderGraph();
    else loadGraph();
  }
}
</script>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script>
const FACT_TYPE_NAMES = {{ FACT_TYPE_NAMES | tojson }};
const TYPE_ZH = {
  'COMPANY': '企业', 'GROUP': '群体/排名', 'PROJECT': '项目',
  'REGION': '地区', 'PRODUCT': '产品', 'PERSON': '人物',
  'ORG': '机构', 'OTHER': '其他', 'UNKNOWN': '未知', 'COUNTRY': '国家/地区',
};
const COLORS = ['#f472b6','#60a5fa','#a78bfa','#34d399','#f87171','#fbbf24','#2dd4bf','#c084fc','#fb923c','#818cf8'];

let currentSimulation = null;
let graphData = null;
let linkLabelsEl = null;
let linkLabelBgEl = null;

// Load data
async function loadGraph() {
  const type = document.getElementById('filterType').value;
  const url = '/api/graph' + (type ? '?fact_type=' + encodeURIComponent(type) : '');
  try {
    const resp = await fetch(url);
    graphData = await resp.json();
    renderGraph();
    updateStats();
  } catch (e) {
    console.error('Failed to load graph:', e);
  }
}

function updateStats() {
  const s = graphData.stats;
  const el = document.getElementById('graphStats');
  el.innerHTML = `
    <strong>${s.entity_count}</strong> 个实体节点 · <strong>${s.relational_facts}</strong> 条关系边<br>
    已通过事实: ${s.total_passed_facts}（关系型: ${s.relational_facts} · 数值型: ${s.metric_facts}）
  `;
  document.getElementById('graphEmpty').style.display = s.entity_count === 0 ? 'block' : 'none';
}

function renderGraph() {
  if (!graphData) return;
  if (currentSimulation) currentSimulation.stop();

  const svg = d3.select('#graphSvg');
  svg.selectAll('*').remove();

  const container = svg.node().parentElement;
  const width = container.clientWidth;
  const height = container.clientHeight;
  svg.attr('width', width).attr('height', height).attr('viewBox', `0 0 ${width} ${height}`);

  const nodes = graphData.nodes.map(n => ({...n}));
  const edges = graphData.edges;

  // 每个节点分配独立颜色：标准化实体用实体类型激光色，文本节点用按名称哈希分配的柔和色
  const TEXT_NODE_COLOR = '#6b6b6b';
  // 标准化实体类型颜色
  const TYPE_COLORS = { COMPANY: '#3b82f6', PROJECT: '#f472b6', GROUP: '#f59e0b', REGION: '#94a3b8', COUNTRY: '#a78bfa', PRODUCT: '#2dd4bf', PERSON: '#fb923c', ORG: '#818cf8', OTHER: '#6b6b6b', UNKNOWN: '#60a5fa' };
  // 文本节点可用颜色查找表（柔和富色）
  const TEXT_PALETTE = ['#34d399','#f87171','#fbbf24','#2dd4bf','#c084fc','#fb923c','#818cf8','#4ade80','#e879f9','#38bdf8','#a3e635','#fd8a8a','#67e8f9','#fdba74','#d8b4fe'];
  function strHash(s) { let h = 0; for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0; return h; }
  const getNodeColor = (d) => {
    if (!d.is_text_node) return TYPE_COLORS[d.entity_type] || '#60a5fa';
    return TEXT_PALETTE[strHash(d.name) % TEXT_PALETTE.length];
  };
  const getNodeFill = (d) => {
    if (!d.is_text_node) return TYPE_COLORS[d.entity_type] || '#60a5fa';
    // 文本节点：同色超低透明底
    const c = TEXT_PALETTE[strHash(d.name) % TEXT_PALETTE.length];
    return c + '22';
  };

  if (nodes.length === 0) {
    document.getElementById('graphLegend').style.display = 'none';
    return;
  }

  // Build node id set
  const nodeIdSet = new Set(nodes.map(n => n.id));

  // Entity type colors (for legend - standard nodes only)
  const typeMap = {};
  nodes.forEach(n => {
    if (n.is_text_node) return;
    if (!typeMap[n.entity_type]) {
      typeMap[n.entity_type] = { name: n.entity_type, count: 0, color: TYPE_COLORS[n.entity_type] || '#60a5fa' };
    }
    typeMap[n.entity_type].count++;
  });
  const getColor = (type) => typeMap[type] ? typeMap[type].color : '#60a5fa';

  // Build legend
  const legendPanel = document.getElementById('graphLegend');
  legendPanel.style.display = 'block';

  const textNodeCount = nodes.filter(n => n.is_text_node).length;
  const legendTypeItems = Object.values(typeMap).map(t =>
    `<div class="graph-legend-item"><span class="graph-legend-dot" style="background:${t.color}"></span>${TYPE_ZH[t.name] || t.name} (${t.count})</div>`
  );
  if (textNodeCount > 0) {
    legendTypeItems.push(
      `<div class="graph-legend-item"><span class="graph-legend-dot" style="background:none;border:1.5px dashed ${TEXT_NODE_COLOR};display:inline-block;width:10px;height:10px;border-radius:50%;vertical-align:middle;"></span>未标准化 (${textNodeCount})</div>`
    );
  }
  legendPanel.innerHTML = '<span class="graph-legend-title">实体类型</span><div class="graph-legend-items">' + legendTypeItems.join('') + '</div>';

  // Count edges per pair for curvature
  const edgePairCount = {};
  const edgePairIndex = {};
  const filteredEdges = edges.filter(e => nodeIdSet.has(e.source) && nodeIdSet.has(e.target));

  filteredEdges.forEach(e => {
    const key = [e.source, e.target].sort().join('_');
    edgePairCount[key] = (edgePairCount[key] || 0) + 1;
  });

  const links = filteredEdges.map(e => {
    const key = [e.source, e.target].sort().join('_');
    const total = edgePairCount[key];
    const idx = edgePairIndex[key] || 0;
    edgePairIndex[key] = idx + 1;
    const isReversed = e.source > e.target;
    let curvature = 0;
    if (total > 1) {
      const range = Math.min(1.2, 0.6 + total * 0.15);
      curvature = ((idx / (total - 1)) - 0.5) * range * 2;
      if (isReversed) curvature = -curvature;
    }
    return { ...e, curvature, pairTotal: total };
  });

  // Simulation
  const simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(d => 150 + (d.pairTotal - 1) * 50))
    .force('charge', d3.forceManyBody().strength(-400))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collide', d3.forceCollide(50))
    .force('x', d3.forceX(width / 2).strength(0.04))
    .force('y', d3.forceY(height / 2).strength(0.04));
  currentSimulation = simulation;

  // Arrow marker
  const defs = svg.append('defs');
  defs.append('marker')
    .attr('id','arrow').attr('viewBox','0 -5 10 10')
    .attr('refX', 22).attr('refY', 0)
    .attr('markerWidth', 6).attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('path').attr('d','M0,-4L8,0L0,4').attr('fill','#94a3b8');
  defs.append('marker')
    .attr('id','arrow-kb').attr('viewBox','0 -5 10 10')
    .attr('refX', 22).attr('refY', 0)
    .attr('markerWidth', 6).attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('path').attr('d','M0,-4L8,0L0,4').attr('fill','#a78bfa');

  const g = svg.append('g');
  svg.call(d3.zoom().scaleExtent([0.1, 4]).on('zoom', e => g.attr('transform', e.transform)));

  // Link paths
  const getLinkPath = (d) => {
    const sx = d.source.x, sy = d.source.y, tx = d.target.x, ty = d.target.y;
    if (d.curvature === 0) return `M${sx},${sy} L${tx},${ty}`;
    const dx = tx - sx, dy = ty - sy;
    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
    const offsetRatio = 0.25 + (d.pairTotal || 1) * 0.05;
    const base = Math.max(35, dist * offsetRatio);
    const ox = -dy/dist * d.curvature * base;
    const oy = dx/dist * d.curvature * base;
    const cx = (sx+tx)/2 + ox, cy = (sy+ty)/2 + oy;
    return `M${sx},${sy} Q${cx},${cy} ${tx},${ty}`;
  };

  const getLinkMid = (d) => {
    const sx = d.source.x, sy = d.source.y, tx = d.target.x, ty = d.target.y;
    if (d.curvature === 0) return {x:(sx+tx)/2, y:(sy+ty)/2};
    const dx = tx-sx, dy = ty-sy;
    const dist = Math.sqrt(dx*dx+dy*dy)||1;
    const offsetRatio = 0.25 + (d.pairTotal||1)*0.05;
    const base = Math.max(35, dist*offsetRatio);
    const ox = -dy/dist*d.curvature*base;
    const oy = dx/dist*d.curvature*base;
    const cx=(sx+tx)/2+ox, cy=(sy+ty)/2+oy;
    return {x: 0.25*sx+0.5*cx+0.25*tx, y: 0.25*sy+0.5*cy+0.25*ty};
  };

  const linkGroup = g.append('g');
  const link = linkGroup.selectAll('path').data(links).enter().append('path')
    .attr('stroke', d => d.is_kb_relation ? '#a78bfa' : '#94a3b8')
    .attr('stroke-width', d => d.is_kb_relation ? 2 : 1.5)
    .attr('stroke-dasharray', d => d.is_kb_relation ? '6,3' : 'none')
    .attr('fill','none')
    .attr('marker-end', d => d.is_kb_relation ? 'url(#arrow-kb)' : 'url(#arrow)')
    .style('cursor','pointer')
    .on('click', (ev, d) => { ev.stopPropagation(); showEdgeDetail(d); highlightEdge(d); });

  const showLabels = document.getElementById('edgeLabelToggle').checked;
  const linkLabelBg = linkGroup.selectAll('rect').data(links).enter().append('rect')
    .attr('fill','rgba(255,255,255,0.92)').attr('rx',3).attr('ry',3)
    .style('cursor','pointer').style('display', showLabels?'block':'none')
    .on('click', (ev,d) => { ev.stopPropagation(); showEdgeDetail(d); highlightEdge(d); });
  linkLabelBgEl = linkLabelBg;

  const linkLabels = linkGroup.selectAll('text').data(links).enter().append('text')
    .text(d => {
      const pred = d.predicate || '';
      return pred.length > 8 ? pred.substring(0, 8) + '…' : (pred || FACT_TYPE_NAMES[d.fact_type] || d.fact_type || 'RELATED');
    })
    .attr('font-size','9px').attr('fill', d => d.is_kb_relation ? '#a78bfa' : '#6b6b6b')
    .attr('font-weight', d => d.is_kb_relation ? '600' : 'normal')
    .attr('text-anchor','middle')
    .attr('dominant-baseline','middle').style('cursor','pointer')
    .style('font-family','system-ui,sans-serif').style('display', showLabels?'block':'none')
    .on('click', (ev,d) => { ev.stopPropagation(); showEdgeDetail(d); highlightEdge(d); });
  linkLabelsEl = linkLabels;

  // Nodes
  const nodeGroup = g.append('g');
  const node = nodeGroup.selectAll('circle').data(nodes).enter().append('circle')
    .attr('r', d => Math.max(8, Math.min(16, 6 + (d.fact_count || 1))))
    .attr('fill', d => getNodeFill(d))
    .attr('stroke', d => getNodeColor(d))
    .attr('stroke-width', d => d.is_text_node ? 1.5 : 2.5)
    .attr('stroke-dasharray', d => d.is_text_node ? '5,3' : 'none')
    .style('cursor','pointer')
    .call(d3.drag()
      .on('start', (ev,d) => { d.fx=d.x; d.fy=d.y; d._ds=ev; d._drag=false; })
      .on('drag', (ev,d) => {
        if(!d._drag && Math.sqrt((ev.x-d._ds.x)**2+(ev.y-d._ds.y)**2)>3) {
          d._drag=true; simulation.alphaTarget(0.3).restart();
        }
        if(d._drag){d.fx=ev.x;d.fy=ev.y;}
      })
      .on('end', (ev,d) => { if(d._drag) simulation.alphaTarget(0); d.fx=null;d.fy=null; })
    )
    .on('click', (ev,d) => { ev.stopPropagation(); showNodeDetail(d); highlightNode(d,link,node); })
    .on('dblclick', (ev,d) => {
      ev.preventDefault(); ev.stopPropagation();
      window.getSelection && window.getSelection().removeAllRanges();
      if(!d.is_text_node) window.location.href='/entity/'+d.id;
    })
    .on('mouseenter',(ev,d)=>{ d3.select(ev.target).attr('stroke','#fafafa').attr('stroke-width',3); })
    .on('mouseleave',(ev,d)=>{ d3.select(ev.target).attr('stroke', getNodeColor(d)).attr('stroke-width',d.is_text_node?1.5:2.5); });

  const nodeLabels = nodeGroup.selectAll('text').data(nodes).enter().append('text')
    .text(d => d.name)
    .attr('font-size','11px').attr('fill','#374151').attr('font-weight','500')
    .attr('dx',14).attr('dy',4).style('pointer-events','none')
    .style('font-family','system-ui,sans-serif');

  // Tick
  simulation.on('tick', () => {
    link.attr('d', d => getLinkPath(d));
    linkLabels.each(function(d){
      const m=getLinkMid(d); d3.select(this).attr('x',m.x).attr('y',m.y);
    });
    linkLabelBg.each(function(d,i){
      const m=getLinkMid(d); const tb=linkLabels.nodes()[i].getBBox();
      d3.select(this).attr('x',m.x-tb.width/2-4).attr('y',m.y-tb.height/2-2).attr('width',tb.width+8).attr('height',tb.height+4);
    });
    node.attr('cx', d=>d.x).attr('cy', d=>d.y);
    nodeLabels.attr('x', d=>d.x).attr('y', d=>d.y);
  });

  // Click blank to close detail
  svg.on('click', () => {
    closeDetail();
    node.attr('stroke', d => getNodeColor(d)).attr('stroke-width', d => d.is_text_node ? 1.5 : 2.5);
    link.attr('stroke', d => d.is_kb_relation ? '#a78bfa' : '#94a3b8')
        .attr('stroke-width', d => d.is_kb_relation ? 2 : 1.5);
  });
}

function highlightNode(d, link, node) {
  node.attr('stroke', n => getNodeColor(n)).attr('stroke-width', n => n.is_text_node ? 1.5 : 2.5);
  link.attr('stroke', e => e.is_kb_relation ? '#a78bfa' : '#94a3b8')
      .attr('stroke-width', e => e.is_kb_relation ? 2 : 1.5);
  d3.select(event.target).attr('stroke','#f472b6').attr('stroke-width',4);
  link.filter(l => l.source.id===d.id || l.target.id===d.id).attr('stroke','#f472b6').attr('stroke-width',2.5);
}

function highlightEdge(d) {
  d3.select(event.target).attr('stroke','#60a5fa').attr('stroke-width',3);
}

function showNodeDetail(d) {
  document.getElementById('detailTitle').textContent = '实体详情';
  const timelineLink = d.is_text_node
    ? '<div class="gd-section"><span style="font-size:11px;color:#6b6b6b;">⚠️ 未标准化实体，需在主体管理中关联标准名称后才可查看详情</span></div>'
    : `<div class="gd-section"><a class="gd-link" href="/entity/${d.id}">📋 查看实体详情 →</a></div>`;
  let html = `
    <div class="gd-row"><span class="gd-label">名称</span><span class="gd-value" style="font-weight:700;font-size:15px;">${d.is_text_node ? esc(d.name) : '<a href="/entity/'+d.id+'" style="color:#60a5fa;text-decoration:none;">'+esc(d.name)+'</a>'}</span></div>
    <div class="gd-row"><span class="gd-label">类型</span><span class="gd-value"><span class="gd-badge badge-info">${d.is_text_node ? '⚫ 文本节点' : (TYPE_ZH[d.entity_type] || esc(d.entity_type))}</span></span></div>
    <div class="gd-row"><span class="gd-label">关联事实</span><span class="gd-value">${d.fact_count || 0} 条</span></div>
    ${timelineLink}
  `;
  // List related edges
  const related = graphData.edges.filter(e => e.source === d.id || (e.source && e.source.id === d.id) || e.target === d.id || (e.target && e.target.id === d.id));
  if (related.length > 0) {
    html += '<div class="gd-section"><div class="gd-section-title">相关事实 (' + related.length + ')</div>';
    related.slice(0, 10).forEach(e => {
      const val = e.value_num != null ? `<span class="gd-value-highlight">${e.value_num}</span><span class="gd-unit">${esc(e.unit||'')}</span>` : (e.value_text ? esc(e.value_text) : '');
      html += `<div style="padding:6px 0;border-bottom:1px solid #e2e8f0;font-size:12px;">
        <span class="gd-badge badge-${e.fact_type}" style="font-size:10px;">${FACT_TYPE_NAMES[e.fact_type]||e.fact_type}</span>
        <span style="color:#a1a1a1;margin-left:4px;">${esc(e.subject_text)} ${esc(e.predicate||'')} ${esc(e.object_text||'')}</span>
        ${val ? '<br>'+val : ''}
        ${e.time_expr ? '<br><span style="color:#6b6b6b;">⏰ '+esc(e.time_expr)+'</span>':''}
      </div>`;
    });
    if (related.length > 10) html += `<div style="font-size:11px;color:#94a3b8;margin-top:6px;">还有 ${related.length-10} 条...</div>`;
    html += '</div>';
  }
  document.getElementById('detailBody').innerHTML = html;
  document.getElementById('detailPanel').classList.add('show');
}

function showEdgeDetail(d) {
  document.getElementById('detailTitle').textContent = '事实详情';
const val = d.value_num != null ? `<span class="gd-value-highlight">${d.value_num}</span><span class="gd-unit">${esc(d.unit||'')} ${esc(d.currency||'')}</span>` : (d.value_text ? `<span style="font-weight:600;color:#0f172a;">${esc(d.value_text)}</span>` : '<span style="color:#94a3b8;">无</span>');

  // Build clickable entity links for subject/object
  const subjectLink = d.subject_entity_id
    ? `<a href="/entity/${d.subject_entity_id}" style="color:#60a5fa;text-decoration:none;font-weight:600;">${esc(d.subject_text)}</a>`
    : esc(d.subject_text);
  const objectLink = d.object_entity_id
    ? `<a href="/entity/${d.object_entity_id}" style="color:#60a5fa;text-decoration:none;font-weight:600;">${esc(d.object_text||'')}</a>`
    : esc(d.object_text||'');

  let html = `
    <div style="background:#f8fafc;padding:10px 12px;border-radius:8px;margin-bottom:14px;font-size:13px;font-weight:500;color:#374151;line-height:1.5;border:1px solid #e2e8f0;">
      ${subjectLink} → ${esc(d.predicate||'')} → ${objectLink}
    </div>
    <div class="gd-row"><span class="gd-label">类型</span><span class="gd-value"><span class="gd-badge badge-${d.fact_type}">${FACT_TYPE_NAMES[d.fact_type]||d.fact_type}</span></span></div>
    <div class="gd-row"><span class="gd-label">数值</span><span class="gd-value">${val}</span></div>
    <div class="gd-row"><span class="gd-label">时间</span><span class="gd-value">${esc(d.time_expr||'—')}</span></div>
    <div class="gd-row"><span class="gd-label">地点</span><span class="gd-value">${esc(d.location_text||'—')}</span></div>
    <div class="gd-row"><span class="gd-label">置信度</span><span class="gd-value">${d.confidence_score != null ? d.confidence_score.toFixed(2) : '—'}</span></div>
    <div class="gd-row"><span class="gd-label">来源</span><span class="gd-value">${esc(d.document_title||'—')}</span></div>
  `;
  if (d.evidence_text) {
    html += `<div class="gd-section"><div class="gd-section-title">证据原文</div><div class="gd-evidence">${esc(d.evidence_text)}</div></div>`;
  }
  document.getElementById('detailBody').innerHTML = html;
  document.getElementById('detailPanel').classList.add('show');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('show');
}

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// Edge label toggle
document.getElementById('edgeLabelToggle').addEventListener('change', function(){
  const show = this.checked ? 'block' : 'none';
  if (linkLabelsEl) linkLabelsEl.style('display', show);
  if (linkLabelBgEl) linkLabelBgEl.style('display', show);
});

// Filter change
document.getElementById('filterType').addEventListener('change', loadGraph);

// 搜索实体节点：高亮 + 平移居中
function searchGraphNode() {
  const q = (document.getElementById('filterSearch').value || '').trim().toLowerCase();
  const hint = document.getElementById('searchMatchHint');
  if (!q || !graphData) { hint.textContent = ''; resetHighlight(); return; }
  const matches = graphData.nodes.filter(n => n.name.toLowerCase().includes(q));
  hint.textContent = matches.length ? `匹配 ${matches.length} 个节点` : '未找到匹配节点';
  hint.style.color = matches.length ? '#fbbf24' : '#dc2626';
  if (!matches.length) { resetHighlight(); return; }
  // 高亮匹配节点，其余变暗
  const matchIds = new Set(matches.map(n => n.id));
  d3.selectAll('#graphSvg circle').attr('opacity', d => matchIds.has(d.id) ? 1 : 0.1)
    .attr('stroke-width', d => matchIds.has(d.id) ? 4 : 1);
  d3.selectAll('#graphSvg text').attr('opacity', function(d) {
    if (!d) return 1;
    // 边标签：有 source 属性的是边数据
    if (d.source !== undefined) {
      const sid = typeof d.source === 'object' ? d.source.id : d.source;
      const tid = typeof d.target === 'object' ? d.target.id : d.target;
      return (matchIds.has(sid) || matchIds.has(tid)) ? 1 : 0.05;
    }
    // 节点标签
    return d.id ? (matchIds.has(d.id) ? 1 : 0.1) : 0.3;
  });
  d3.selectAll('#graphSvg path').attr('opacity', d => {
    if (!d || !d.source) return 0.3;
    const sid = typeof d.source === 'object' ? d.source.id : d.source;
    const tid = typeof d.target === 'object' ? d.target.id : d.target;
    return (matchIds.has(sid) || matchIds.has(tid)) ? 1 : 0.05;
  });
  // 平移到第一个匹配节点
  const first = matches[0];
  if (first.x != null && first.y != null) {
    const svg = d3.select('#graphSvg');
    const container = svg.node().parentElement;
    const w = container.clientWidth, h = container.clientHeight;
    const k = 1.5;
    svg.transition().duration(500)
      .call(d3.zoom().scaleExtent([0.1, 4]).on('zoom', e => d3.select('#graphSvg > g').attr('transform', e.transform))
        .transform, d3.zoomIdentity.translate(w/2 - first.x * k, h/2 - first.y * k).scale(k));
  }
}

function resetHighlight() {
  d3.selectAll('#graphSvg circle').attr('opacity', 1).attr('stroke-width', d => d && d.is_text_node ? 1.5 : 2.5);
  d3.selectAll('#graphSvg text').attr('opacity', 1);
  d3.selectAll('#graphSvg path').attr('opacity', 1);
}

// 客户端筛选（实体类型 + 最少事实数）
function applyClientFilter() {
  if (!graphData) return;
  const etFilter = document.getElementById('filterEntityType').value;
  const minFacts = parseInt(document.getElementById('filterMinFacts').value) || 0;

  d3.selectAll('#graphSvg circle').each(function(d) {
    let visible = true;
    if (minFacts > 0 && (d.fact_count || 0) < minFacts) visible = false;
    if (etFilter) {
      if (etFilter === '__TEXT__') {
        if (!d.is_text_node) visible = false;
      } else {
        if (d.is_text_node || d.entity_type !== etFilter) visible = false;
      }
    }
    d3.select(this).attr('opacity', visible ? 1 : 0.06).attr('r', visible ? Math.max(8, Math.min(16, 6 + (d.fact_count || 1))) : 3);
  });

  const visibleIds = new Set();
  d3.selectAll('#graphSvg circle').each(function(d) {
    if (d3.select(this).attr('opacity') > 0.5) visibleIds.add(d.id);
  });

  d3.selectAll('#graphSvg text').attr('opacity', function(d) {
    if (!d) return 1;
    // 边标签：有 source 属性的是边数据
    if (d.source !== undefined) {
      const sid = typeof d.source === 'object' ? d.source.id : d.source;
      const tid = typeof d.target === 'object' ? d.target.id : d.target;
      return (visibleIds.has(sid) && visibleIds.has(tid)) ? 1 : 0.05;
    }
    // 节点标签
    return d.id ? (visibleIds.has(d.id) ? 1 : 0.06) : 0.3;
  });
  d3.selectAll('#graphSvg path').attr('opacity', d => {
    if (!d || !d.source) return 0.3;
    const sid = typeof d.source === 'object' ? d.source.id : d.source;
    const tid = typeof d.target === 'object' ? d.target.id : d.target;
    return (visibleIds.has(sid) && visibleIds.has(tid)) ? 1 : 0.03;
  });
}

// Initial load
loadGraph();
window.addEventListener('resize', () => { if(graphData) renderGraph(); });
</script>

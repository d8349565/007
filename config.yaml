# ============================================================
# 资讯颗粒化收集系统 - 主配置文件
# ============================================================

# --- 数据库 ---
database:
  path: "data/mvp.db"

# --- LLM / DeepSeek ---
llm:
  provider: "deepseek"
  base_url: "https://api.deepseek.com"
  model: "deepseek-chat"
  temperature: 0.1
  max_tokens: 4096
  timeout: 120          # 秒
  max_retries: 3
  retry_delay: 2        # 秒

# --- 文本切分 ---
splitter:
  short_text_threshold: 1200   # ≤ 此字数不切分
  chunk_min: 300               # 最小块（中文字）
  chunk_ideal: 700             # 理想块大小
  chunk_max: 1200              # 最大块大小
  overlap: 80                  # 相邻块 overlap（中文字）

# --- 文本清洗 ---
cleaner:
  remove_ads: true
  remove_navigation: true
  remove_disclaimer: true
  strip_html_tags: true
  normalize_whitespace: true

# --- fact_type 白名单（第一批 9 类） ---
fact_types:
  - FINANCIAL_METRIC
  - SALES_VOLUME
  - CAPACITY
  - INVESTMENT
  - EXPANSION
  - MARKET_SHARE
  - COMPETITIVE_RANKING
  - COOPERATION
  - PRICE_CHANGE

# --- predicate 白名单 ---
# 使用模糊匹配：LLM 输出的 predicate 包含白名单词根即视为匹配
predicate_whitelist:
  FINANCIAL_METRIC:
    - 实现
    - 销售收入
    - 新增销售收入
    - 累计销售收入
    - 收入为
    - 营业收入
    - 净利润
    - 毛利率
    - 价值增长
    - 同比增长
    - 同比下降
    - 销售额
    - 综合销售额
    - 营收
    - 利润总额
    - 增长率
  SALES_VOLUME:
    - 实现
    - 销售量
    - 新接订单量
    - 手持订单量
    - 产量
    - 出货量
    - 完工量
    - 交付量
    - 消费量
  CAPACITY:
    - 规划
    - 新增年产
    - 产能
    - 扩建产能
    - 建成产能
    - 规划产能
    - 年产能
    - 设计产能
  INVESTMENT:
    - 计划总投资
    - 投资额
    - 总投资
    - 签约投资
    - 投资
  EXPANSION:
    - 新建
    - 扩建
    - 开工建设
    - 投产
    - 布局
    - 建设
    - 落地
    - 竣工
  MARKET_SHARE:
    - 市场份额
    - 占市场份额
    - 占全国市场份额
    - 占全球市场份额
    - 市占率
    - 市场份额为
    - 前十强市占率
    - 前五市占率
  COMPETITIVE_RANKING:
    - 排名第
    - 位居第
    - 跻身前
    - 入选
    - 连续排名
    - 名列
    - 排名在范围内
  COOPERATION:
    - 签署合作协议
    - 战略合作
    - 联合开发
    - 供货
    - 合作
    - 签约
  PRICE_CHANGE:
    - 价格上涨
    - 价格下跌
    - 价格调整
    - 均价
    - 涨价
    - 降价

# --- qualifiers 白名单 ---
qualifier_whitelist:
  FINANCIAL_METRIC:
    - metric_name
    - segment
    - yoy
    - qoq
    - report_scope
    - is_forecast
    - change_amount
    - change_from_previous_year
    - equivalent_usd
    - equivalent_rmb
    - equivalent_weight
    - is_approximate
  SALES_VOLUME:
    - metric_name
    - segment
    - yoy
    - qoq
    - scope
    - change_amount
    - change_from_previous_year
    - equivalent_weight
    - is_approximate
  CAPACITY:
    - product_type
    - segment
    - is_planned
    - phase
    - equivalent_weight
  INVESTMENT:
    - project_name
    - investment_type
    - segment
    - purpose
    - stage
    - equivalent_usd
    - equivalent_rmb
    - is_approximate
  EXPANSION:
    - project_name
    - segment
    - stage
    - capacity_related
    - investment_related
  MARKET_SHARE:
    - market_scope
    - segment
    - ranking_scope
    - source_scope
    - yoy
    - change_amount
    - change_pct
    - is_approximate
  COMPETITIVE_RANKING:
    - ranking_name
    - ranking_year
    - segment
    - rank
    - ranking_scope
    - position_range
  COOPERATION:
    - cooperation_type
    - project_name
    - segment
    - duration
    - scope
  PRICE_CHANGE:
    - product_name
    - segment
    - price_type
    - change_pct
    - reason
    - yoy
    - change_amount
    - is_approximate
    - yoy
    - change_amount

# --- 审核 ---
review:
  auto_pass_confidence: 0.90
  force_human_review_types:
    - COMPETITIVE_RANKING
  force_human_review_predicates: []

# --- 日志 ---
logging:
  level: "INFO"
  log_dir: "logs"
  max_bytes: 10485760      # 10MB
  backup_count: 5

# --- Web 审核界面 ---
web:
  host: "127.0.0.1"
  port: 5000
  debug: false

# --- 导入 ---
importer:
  supported_extensions:
    - ".txt"
    - ".md"
  url_timeout: 30
  batch_progress: true

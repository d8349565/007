# ============================================================
# 资讯颗粒化收集系统 - 主配置文件
# ============================================================

# --- 数据库 ---
database:
  path: "data/mvp.db"

# --- LLM 提供商切换（修改此处即可切换模型）---
# 可选值：deepseek / kimi / minimax
llm:
  provider: "minimax"

  # --- DeepSeek 配置 ---
  deepseek:
    base_url: "https://api.deepseek.com"
    model: "deepseek-chat"
    api_key_env: "DEEPSEEK_API_KEY"  # 从 .env 读取

  # --- 阿里云 DashScope / Kimi 配置 ---
  kimi:
    base_url: "https://coding.dashscope.aliyuncs.com/v1"
    model: "kimi-k2.5"
    api_key_env: "KIMI_API_KEY"  # 从 .env 读取

  # --- MiniMax 配置 ---
  minimax:
    base_url: "https://api.minimaxi.com/v1"
    model: "MiniMax-M2.7-highspeed"
    api_key_env: "MINIMAX_API_KEY"  # 从 .env 读取

  # --- 通用参数 ---
  temperature: 0.1
  max_tokens: 8192
  timeout: 120          # 秒
  max_retries: 3
  retry_delay: 2        # 秒

# --- 模型价格（元/百万tokens）---
model_pricing:
  deepseek-chat:
    input_cached: 0.2    # 缓存命中
    input_uncached: 2.0  # 缓存未命中
    output: 3.0          # 输出
  kimi-k2.5:
    input: 0.0           # 待补全
    output: 0.0          # 待补全

# --- 文本切分 ---
splitter:
  short_text_threshold: 1200   # ≤ 此字数不切分
  chunk_min: 300               # 最小块（中文字）
  chunk_ideal: 700             # 理想块大小
  chunk_max: 1200              # 最大块大小
  overlap: 80                  # 相邻块 overlap（中文字）

# --- 文本清洗 ---
cleaner:
  remove_ads: true
  remove_navigation: true
  remove_disclaimer: true
  strip_html_tags: true
  normalize_whitespace: true

# --- 处理管线 ---
pipeline:
  min_clean_chars: 100              # 清洗后文本低于此字数跳过
  enable_complementation: true      # 是否启用阶段2上下文补全（关闭可省 token）
  max_concurrent_docs: 10            # 后台最多同时处理几篇文档

# --- fact_type 白名单（第一批 9 类） ---
fact_types:
  - FINANCIAL_METRIC
  - SALES_VOLUME
  - CAPACITY
  - INVESTMENT
  - EXPANSION
  - MARKET_SHARE
  - COMPETITIVE_RANKING
  - COOPERATION
  - PRICE_CHANGE


# --- 审核 ---
review:
  auto_pass_confidence: 0.65
  force_human_review_types: []
  force_human_review_predicates: []
  # 特定 fact_type 必须在 qualifiers 中含有以下字段之一，否则即使 PASS 也不允许 AUTO_PASS
  require_qualifier_any: {}

# --- 日志 ---
logging:
  level: "INFO"
  log_dir: "logs"
  max_bytes: 10485760      # 10MB
  backup_count: 5

# --- Web 审核界面 ---
web:
  host: "127.0.0.1"
  port: 5000
  debug: true

# --- 导入 ---
importer:
  supported_extensions:
    - ".txt"
    - ".md"
  url_timeout: 30
  batch_progress: true
